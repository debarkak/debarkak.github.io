  <script>
    function parseFrontmatter(rawMarkdown) {
      var result = { title: '', date: '', description: '', body: rawMarkdown };
      if (!rawMarkdown.startsWith('---')) return result;
      var end = rawMarkdown.indexOf('---', 3);
      if (end === -1) return result;
      var frontmatter = rawMarkdown.substring(3, end).trim();
      result.body = rawMarkdown.substring(end + 3).trim();
      frontmatter.split('\n').forEach(function(line) {
        var colon = line.indexOf(':');
        if (colon === -1) return;
        var key = line.substring(0, colon).trim();
        var value = line.substring(colon + 1).trim();
        value = value.replace(/^["']|["']$/g, '');
        if (key === 'title') result.title = value;
        else if (key === 'date') result.date = value;
        else if (key === 'description') result.description = value;
      });
      return result;
    }

    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      var months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    async function loadPost() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('p');
      var contentEl = document.getElementById('post-content');

      if (!slug) {
        contentEl.innerHTML = '<p class="info-msg">post not found.</p>';
        return;
      }

      var post = POSTS.find(function(p) { return p.slug === slug; });
      if (!post) {
        contentEl.innerHTML = '<p class="info-msg">post not found.</p>';
        return;
      }

      try {
        // we use post.title, post.date, and post.body_b64 directly from posts.js?v=1778227128
        // this avoids ANY fetch requests, allowing it to work completely offline
        
        document.title = (post.title || slug) + ' · debarka';

        // UTF-8 safe base64 decoding
        var body = '';
        if (post.body_b64) {
          body = decodeURIComponent(escape(atob(post.body_b64)));
        }

        marked.use({
          renderer: {
            image: function(href, title, text) {
              if (typeof href === 'object') {
                text = href.text;
                title = href.title;
                href = href.href;
              }
              var caption = text ? '<figcaption>' + text + '</figcaption>' : '';
              var titleAttr = title ? ' title="' + title + '"' : '';
              return '<figure><img src="' + href + '" alt="' + text + '"' + titleAttr + '>' + caption + '</figure>';
            }
          }
        });

        contentEl.innerHTML =
          '<h1>' + (post.title || slug) + '</h1>' +
          '<p class="post-date">' + formatDate(post.date) + '</p>' +
          marked.parse(body || '');

        hljs.highlightAll();
      } catch (e) {
        console.error(e);
        contentEl.innerHTML = '<p class="info-msg">error rendering post. please check console.</p>';
      }
    }

    loadPost();
  </script>
